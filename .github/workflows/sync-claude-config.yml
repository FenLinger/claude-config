name: Sync Claude Config

on:
  schedule:
    - cron: '0 6 * * 1'       # weekly Monday 6 AM UTC
  workflow_dispatch:
    inputs:
      auto_merge:
        description: 'Auto-merge the sync PR after creation'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4

      - name: Checkout claude-config
        uses: actions/checkout@v4
        with:
          repository: FenLinger/claude-config
          path: _claude-config

      - name: Sync skills
        run: |
          rm -rf .claude/skills/
          mkdir -p .claude/
          cp -r _claude-config/skills/ .claude/skills/

      - name: Compose CLAUDE.md
        run: |
          bash _claude-config/compose.sh \
            --base _claude-config/claude-md/base.md \
            --config .claude-sync.yml \
            --sections-dir _claude-config/claude-md/sections/ \
            --skills-dir _claude-config/skills/ \
            --output CLAUDE.md

      - name: Clean up
        run: rm -rf _claude-config

      - name: Create sync PR
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: sync Claude config from claude-config'
          branch: sync/claude-config
          delete-branch: true
          title: 'chore: sync Claude config'
          body: |
            Automated sync from FenLinger/claude-config.
            Review the diff to verify changes are expected.

      - name: Auto-merge PR
        if: >-
          inputs.auto_merge == 'true'
          && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} \
            --merge --delete-branch
